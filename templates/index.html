<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratchpad</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
          integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
          integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10/dist/interact.min.js"></script>
</head>
<body>
    <div class="sp-app">
        <header class="sp-toolbar">
            <div class="sp-brand">
                <i class="fas fa-edit"></i>
                <span class="sp-brand-name">Scratchpad</span>
                <span class="sp-dirty-dot" id="dirtyDot" hidden></span>
            </div>
            <div class="sp-toolbar-actions">
                <button id="maximizeButton" class="sp-win-btn" title="Maximize">
                    <i class="fas fa-window-maximize"></i>
                </button>
            </div>
        </header>

        <main class="sp-editor-wrapper">
            <input type="hidden" id="csrf_token" value="{{ csrf_token() }}">
            <textarea id="scratchpad" class="sp-editor" spellcheck="false" placeholder="Start typing…">{{ content }}</textarea>
        </main>

        <footer class="sp-statusbar">
            <span id="wordCount" class="sp-word-count">0 words · 0 chars</span>
            <span id="saveStatus" class="sp-save-status"></span>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
